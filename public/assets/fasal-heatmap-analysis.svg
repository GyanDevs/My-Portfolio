<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0A0A0A"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  <circle cx="400" cy="300" r="150" fill="url(#heatGradient)" fill-opacity="0.6" filter="url(#blur)"/>
  <circle cx="600" cy="200" r="100" fill="url(#heatGradient)" fill-opacity="0.4" filter="url(#blur)"/>
  <circle cx="200" cy="450" r="120" fill="url(#heatGradient)" fill-opacity="0.5" filter="url(#blur)"/>
  <defs>
    <radialGradient id="heatGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 300) rotate(90) scale(150)">
      <stop stop-color="#EF4444"/>
      <stop offset="0.5" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
</svg>
